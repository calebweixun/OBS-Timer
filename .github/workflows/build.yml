name: Build desktop apps

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            command: npm run build:mac -- --publish never
          - name: Windows
            os: windows-latest
            command: npm run build:win -- --publish never
          - name: Linux
            os: ubuntu-latest
            command: npm run build:linux -- --publish never
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build
        run: ${{ matrix.command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - name: Upload installers
        uses: actions/upload-artifact@v7
        with:
          name: OBS-Timer-Remote-${{ matrix.name }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true
      - name: Create release and upload installers
        run: gh release create "$GITHUB_REF_NAME" release-assets/* --verify-tag --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
