<!DOCTYPE html>
<html>
<head>
  <title>OBS Playclock</title>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }

    #border-frame {
      position: fixed;
      pointer-events: none;
      display: none;
      z-index: 10;
    }

    #center {
      position: fixed;
      top: 50%; left: 0;
      width: 100vw;
      padding: 0 2vw;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 5;
    }

    #overlay-text {
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      font-size: 7vw;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 2vw;
      white-space: nowrap;
      text-align: center;
      display: none;
    }

    #title {
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      font-size: 5vw;
      color: #ffffff;
      margin-bottom: 1vw;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      width: 100%;
      max-width: 96vw;
      text-align: center;
      line-height: 1.3;
    }

    #output {
      font-family: ui-monospace, 'SF Mono', 'Courier New', monospace;
      font-size: 18vw;
      color: #ffffff;
      line-height: 1;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    body.is-hidden #output,
    body.is-hidden #title { visibility: hidden; }
  </style>
</head>
<body translate="no">
  <div id="border-frame"></div>
  <div id="center">
    <div id="overlay-text"></div>
    <div id="title"></div>
    <div id="output"></div>
  </div>

  <script>
    const titleEl   = document.getElementById('title');
    const outputEl  = document.getElementById('output');
    const borderEl  = document.getElementById('border-frame');
    const overlayEl = document.getElementById('overlay-text');

    function pad(n) { return n < 10 ? '0' + n : '' + n; }

    function fmtTime(sec) {
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = sec % 60;
      return (h > 0 ? pad(h) + ':' : '') + pad(m) + ':' + pad(s);
    }

    // ── Clock ──
    let clockTick = null;
    function startClock() {
      if (clockTick) return;
      clockTick = setInterval(() => {
        const d = new Date();
        outputEl.innerText = pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
      }, 500);
    }
    function stopClock() {
      if (clockTick) { clearInterval(clockTick); clockTick = null; }
    }

    // ── Overlay flash ──
    let overlayFlashTick  = null;
    let lastOverlayActive = false;
    let lastOverlaySeq    = -1;

    function startOverlayFlash(fg, bg) {
      if (overlayFlashTick) clearInterval(overlayFlashTick);
      let count = 0;
      overlayEl.style.color = fg;
      overlayFlashTick = setInterval(() => {
        count++;
        overlayEl.style.color = (count % 2 === 1) ? bg : fg;
        if (count >= 10) { // 5 complete blinks
          clearInterval(overlayFlashTick);
          overlayFlashTick = null;
          overlayEl.style.color = fg; // 恆亮
        }
      }, 100);
    }

    function stopOverlayFlash() {
      if (overlayFlashTick) { clearInterval(overlayFlashTick); overlayFlashTick = null; }
    }

    // ── Flash ──
    let flashTick        = null;
    let flashState       = false;
    let lastFlashActive  = false;

    function startFlash(st) {
      if (flashTick) clearInterval(flashTick);
      flashState = false;
      const { fg, bg, interval } = st.flash;
      const bFlash = st.border.visible && st.border.flash;

      flashTick = setInterval(() => {
        flashState = !flashState;
        document.body.style.background = flashState ? bg  : fg;
        outputEl.style.color           = flashState ? fg  : bg;
        titleEl.style.color            = flashState ? fg  : bg;
        if (bFlash) {
          borderEl.style.borderColor = flashState ? st.border.flashColor : st.border.color;
        }
      }, interval);
    }

    function stopFlash(st) {
      if (flashTick) { clearInterval(flashTick); flashTick = null; }
      if (!st) return;
      document.body.style.background = st.style.bg;
      outputEl.style.color           = st.style.fg;
      titleEl.style.color            = st.style.fg;
      if (st.border.visible) borderEl.style.borderColor = st.border.color;
    }

    // ── Border ──
    function updateBorder(b) {
      if (!b.visible) { borderEl.style.display = 'none'; return; }
      borderEl.style.display      = 'block';
      borderEl.style.inset        = b.inset + 'px';
      borderEl.style.border       = b.width + 'px ' + b.style + ' ' + b.color;
      borderEl.style.borderRadius = b.radius + 'px';
    }

    // ── Render ──
    function render(st) {
      // Overlay text (shown above clock/timer, always flashes when active)
      const overlayActive = st.overlay && st.overlay.active && st.overlay.text;
      const overlaySeq = st.overlay ? (st.overlay.seq || 0) : 0;
      if (overlayActive) {
        overlayEl.textContent = st.overlay.text;
        overlayEl.style.display = 'block';
        if (!lastOverlayActive || overlaySeq !== lastOverlaySeq) {
          startOverlayFlash(st.flash.fg, st.flash.bg);
          lastOverlaySeq = overlaySeq;
        }
      } else {
        overlayEl.style.display = 'none';
        stopOverlayFlash();
      }
      lastOverlayActive = !!overlayActive;

      // Base style (when not flashing)
      if (!st.flash.active) {
        document.body.style.background = st.style.bg;
        outputEl.style.color           = st.style.fg;
        titleEl.style.color            = st.style.fg;
      }

      // Font (output only — title stays system sans)
      outputEl.style.fontFamily = st.style.font || '';

      // Title
      titleEl.innerText     = st.title || '';
      titleEl.style.display = st.title ? '' : 'none';

      // Border
      updateBorder(st.border);

      // Flash — only toggle on active state change
      if (st.flash.active && !lastFlashActive) {
        startFlash(st);
      } else if (!st.flash.active && lastFlashActive) {
        stopFlash(st);
      }
      lastFlashActive = st.flash.active;

      // Visibility
      document.body.classList.toggle('is-hidden', st.mode === 'hidden');

      // Content
      if (st.mode === 'clock') {
        startClock();
      } else {
        stopClock();
        if      (st.mode === 'timer') outputEl.innerText = fmtTime(st.timer.remaining);
        else if (st.mode === 'text')  outputEl.innerText = st.text;
        else                          outputEl.innerText = '';
      }
    }

    // ── SSE ──
    function connect() {
      const es = new EventSource('/events');
      es.onmessage = e => render(JSON.parse(e.data));
      es.onerror   = () => { es.close(); setTimeout(connect, 2000); };
    }
    connect();
  </script>
</body>
</html>
